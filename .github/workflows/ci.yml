name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Validate pull request body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          pr_body_file="${RUNNER_TEMP:-${TMPDIR:-$HOME/.cache}}/pull-request-body.md"
          printf '%s' "$PR_BODY" > "$pr_body_file"
          repo-automation/bin/pr-body-check --quiet --body-file="$pr_body_file"

      - name: Run checks
        run: |
          set -euo pipefail
          run_tests_log="$RUNNER_TEMP/run-tests.log"
          shellcheck_log="$RUNNER_TEMP/shellcheck.log"
          mapfile -t shellcheck_paths < <(repo-automation/bin/shellcheck-ci-parity --print-paths)

          git diff --check
          for path in "${shellcheck_paths[@]}"; do
            bash -n "$path"
          done
          if command -v shellcheck >/dev/null 2>&1; then
            if ! shellcheck -e SC2317 "${shellcheck_paths[@]}" >"$shellcheck_log" 2>&1; then
              printf 'fail: shellcheck\n'
              printf 'log: %s\n' "$shellcheck_log"
              exit 1
            fi
          fi
          repo-automation/bin/check-portability
          repo-automation/bin/run-tests --log-file="$run_tests_log"

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            ${{ runner.temp }}/run-tests.log
            ${{ runner.temp }}/shellcheck.log
          if-no-files-found: ignore
