name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Run checks
        run: |
          git diff --check
          bash -n repo-automation/lib/common.sh
          bash -n repo-automation/bin/branch-cleanup
          bash -n repo-automation/bin/codex-slice-preflight
          bash -n repo-automation/bin/post-codex-packet
          bash -n repo-automation/bin/pr-finish
          bash -n repo-automation/bin/add-doc-pr
          bash -n repo-automation/bin/repo-automation-report-upstream
          bash -n repo-automation/bin/repo-doctor
          bash -n repo-automation/bin/repo-automation-install
          bash -n repo-automation/bin/run-tests
          bash -n repo-automation/tests/lib/*.sh
          bash -n repo-automation/tests/docs-check.sh
          bash -n repo-automation/tests/contracts/*.sh
          bash -n repo-automation/tests/smoke.sh
          bash -n repo-automation/tests/version-consistency.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -e SC2317 repo-automation/bin/branch-cleanup repo-automation/bin/codex-slice-preflight repo-automation/bin/post-codex-packet repo-automation/bin/pr-finish repo-automation/bin/add-doc-pr repo-automation/bin/repo-automation-report-upstream repo-automation/bin/repo-doctor repo-automation/bin/repo-automation-install repo-automation/bin/run-tests repo-automation/tests/lib/*.sh repo-automation/tests/docs-check.sh repo-automation/tests/contracts/*.sh repo-automation/tests/smoke.sh repo-automation/tests/version-consistency.sh
          fi
          repo-automation/bin/run-tests
