name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi

      - name: Validate pull request body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          pr_body_file="${RUNNER_TEMP:-${TMPDIR:-$HOME/.cache}}/pull-request-body.md"
          printf '%s' "$PR_BODY" > "$pr_body_file"
          repo-automation/bin/pr-body-check --quiet --body-file="$pr_body_file"

      - name: Run checks
        run: |
          set -euo pipefail
          run_tests_log="$RUNNER_TEMP/run-tests.log"
          shellcheck_log="$RUNNER_TEMP/shellcheck.log"
          check_portability_log="$RUNNER_TEMP/check-portability.log"
          mapfile -t shellcheck_paths < <(repo-automation/bin/shellcheck-ci-parity --print-paths)

          git diff --check
          for path in "${shellcheck_paths[@]}"; do
            bash -n "$path"
          done
          if command -v shellcheck >/dev/null 2>&1; then
            if ! shellcheck -e SC2317 "${shellcheck_paths[@]}" >"$shellcheck_log" 2>&1; then
              printf 'fail: shellcheck\n'
              printf 'log: %s\n' "$shellcheck_log"
              exit 1
            fi
          fi
          repo-automation/bin/check-portability 2>&1 | tee "$check_portability_log"
          repo-automation/bin/run-tests --log-file="$run_tests_log"

      - name: Collect failure artifacts
        if: failure()
        run: |
          set -u -o pipefail
          mkdir -p "$RUNNER_TEMP/ci-failure-artifacts"
          repo-automation/bin/repo-doctor --quick --no-run-tests --json --json-level=warn --log-file="$RUNNER_TEMP/repo-doctor.log" > "$RUNNER_TEMP/repo-doctor.json" 2> "$RUNNER_TEMP/repo-doctor.stderr" || true
          repo-automation/bin/ci-failure-artifacts --out-dir="$RUNNER_TEMP/ci-failure-artifacts" --run-tests-log="$RUNNER_TEMP/run-tests.log" --shellcheck-log="$RUNNER_TEMP/shellcheck.log" --check-portability-log="$RUNNER_TEMP/check-portability.log" --repo-doctor-json="$RUNNER_TEMP/repo-doctor.json" --repo-doctor-log="$RUNNER_TEMP/repo-doctor.log" --repo-doctor-stderr="$RUNNER_TEMP/repo-doctor.stderr" > "$RUNNER_TEMP/ci-failure-artifacts/artifact-generation.log" 2>&1 || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-artifacts
          path: |
            ${{ runner.temp }}/ci-failure-artifacts/**
          if-no-files-found: ignore
